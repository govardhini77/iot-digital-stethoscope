<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Stethoscope Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Digital Stethoscope Analysis System</h1>
        
        <!-- Input Form -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">BPM Analyzer</h5>
                <form id="stethoscopeForm">
                    <div class="mb-3">
                        <label for="restingBPM" class="form-label">Resting BPM</label>
                        <input type="number" class="form-control" id="restingBPM" placeholder="e.g. 70" required>
                    </div>
                    <div class="mb-3">
                        <label for="activityBPM" class="form-label">Activity BPM</label>
                        <input type="number" class="form-control" id="activityBPM" placeholder="e.g. 120" required>
                    </div>
                    <div class="mb-3">
                        <label for="recoveryBPM" class="form-label">Recovery BPM</label>
                        <input type="number" class="form-control" id="recoveryBPM" placeholder="e.g. 85" required>
                    </div>
                    <div class="mb-3">
                        <label for="system" class="form-label">Choose System</label>
                        <select class="form-control" id="system" required>
                            <option value="heart">Heart</option>
                            <option value="lung">Lung</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Analyze</button>
                </form>
            </div>
        </div>

        <!-- Results Dashboard -->
        <div id="resultsDashboard" style="display: none;">
            <div class="row">
                <!-- Health Status -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Health Status</h5>
                            <div id="healthStatus" class="alert">
                                <!-- Status will be inserted here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Risk Assessment -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Risk Assessment</h5>
                            <div id="riskLevel" class="alert">
                                <!-- Risk level will be inserted here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Visualization -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Sound Wave Analysis</h5>
                    <canvas id="soundWaveChart"></canvas>
                </div>
            </div>

            <!-- Medical Analysis -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Medical Analysis</h5>
                    <div id="medicalAnalysis">
                        <!-- Analysis will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="text-center mb-4">
                <button id="downloadReport" class="btn btn-success me-2">Download Report</button>
                <button id="exportData" class="btn btn-secondary">Export Data</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="js/gemini-api.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/report-generator.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
